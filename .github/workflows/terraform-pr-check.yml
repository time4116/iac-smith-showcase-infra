name: Terraform PR Check

on:
  pull_request:
    paths:
      - 'environments/**'
      - 'modules/**'
      - 'bootstrap/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init and validate — modules/ecs-fargate-nginx
        working-directory: modules/ecs-fargate-nginx
        run: |
          terraform init -backend=false -input=false
          terraform validate
